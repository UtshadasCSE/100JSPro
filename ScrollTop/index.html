<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll To Top Button</title>

    <style>
      /* Just demo page height */
      body {
        height: 2000px;
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom, #f5f5f5, #ddd);
      }

      /* ===== Scroll To Top Button ===== */
      .scroll-top-btn {
        position: fixed; /* Stay fixed on screen */
        bottom: 30px; /* 30px from bottom */
        left: 30px; /* 30px from left */
        width: 50px;
        height: 50px;
        border-radius: 50%; /* Make circle */
        background: black;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        cursor: pointer;
        opacity: 0; /* Hidden initially */
        visibility: hidden;
        transform: translateY(20px);
        transition: all 0.3s ease;
        z-index: 1000;
      }

      /* Show button when active */
      .scroll-top-btn.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }

      /* Hover effect */
      .scroll-top-btn:hover {
        background: #333;
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <h1 style="padding: 40px">Scroll Down 👇</h1>

    <!-- Scroll To Top Button -->
    <div class="scroll-top-btn" id="scrollTopBtn">↑</div>

    <script>
      // Select the button
      const scrollBtn = document.getElementById("scrollTopBtn");

      // Show button when user scrolls down
      window.addEventListener("scroll", function () {
        // If page is scrolled more than 200px
        if (window.scrollY > 200) {
          scrollBtn.classList.add("show");
        } else {
          scrollBtn.classList.remove("show");
        }
      });

      // When button is clicked
      scrollBtn.addEventListener("click", function () {
        // Smooth scroll to top
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      });
    </script>
  </body>
</html>
